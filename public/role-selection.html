<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Role | Smart Campus</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Font -->
    <link rel="stylesheet" href="css/role-selection.css">
</head>
<body>

    <div class="selection-container">
        <header class="header-section">
            <h1>Select Your Role</h1>
            <p>Choose your portal to access specialized features and services</p>
        </header>

        <div class="role-grid">
            <!-- Student Card -->
            <a href="/auth?role=Student" class="role-card" id="student-card">
                <div class="icon-wrapper">
                    <i data-lucide="graduation-cap" size="44"></i>
                </div>
                <h3>Student</h3>
            </a>

            <!-- Faculty Card -->
            <a href="/auth?role=Faculty" class="role-card" id="faculty-card">
                <div class="icon-wrapper">
                    <i data-lucide="book-open" size="44"></i>
                </div>
                <h3>Faculty</h3>
            </a>

            <!-- Admin Card -->
            <a href="/auth?role=Admin" class="role-card" id="admin-card">
                <div class="icon-wrapper">
                    <i data-lucide="shield" size="44"></i>
                </div>
                <h3>Admin</h3>
            </a>

            <!-- Worker Card -->
            <a href="/auth?role=Worker" class="role-card" id="worker-card">
                <div class="icon-wrapper">
                    <i data-lucide="hard-hat" size="44"></i>
                </div>
                <h3>Worker</h3>
            </a>

            <!-- Security Guard Card -->
            <a href="/auth?role=Security Guard" class="role-card" id="guard-card">
                <div class="icon-wrapper">
                    <i data-lucide="user-check" size="44"></i>
                </div>
                <h3>Security Guard</h3>
            </a>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Optional: Add click effect feedback (though :active handles most)
        document.querySelectorAll('.role-card').forEach(card => {
            card.addEventListener('click', function(e) {
                // The anchor tag will handle navigation
                console.log('Role selected:', this.querySelector('h3').innerText);
            });
        });
    </script>
</body>
</html>
